name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build+release (e.g., v3.55)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: pwsh
        run: |
          # Accept licenses (best-effort)
          try {
            (1..200 | ForEach-Object { 'y' }) -join "`n" | sdkmanager --licenses | Out-Null
          } catch {}

          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.1.0" | Out-Null

      - name: Ensure debug keystore exists
        shell: pwsh
        run: |
          $ks = Join-Path $env:USERPROFILE ".android\debug.keystore"
          if (!(Test-Path $ks)) {
            New-Item -ItemType Directory -Force (Split-Path $ks) | Out-Null
            keytool -genkeypair -v `
              -keystore $ks -storepass android `
              -alias androiddebugkey -keypass android `
              -dname "CN=Android Debug,O=Android,C=US" `
              -keyalg RSA -keysize 2048 -validity 10000
          }

      - name: Pack patches
        shell: pwsh
        working-directory: HSPatcher
        run: .\pack_patches.ps1

      - name: Build APK
        shell: pwsh
        working-directory: HSPatcher
        run: .\build.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HSPatcher.apk
          path: HSPatcher/build/HSPatcher.apk

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: HSPatcher/build/HSPatcher.apk
          generate_release_notes: true
